services:
  - type: web
    name: lumio-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python scripts/ingest_books.py
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CHROMA_PERSIST_DIR
        value: ./data/chroma_db
      - key: EMBEDDING_MODEL
        value: models/gemini-embedding-001
      - key: GENERATION_MODEL
        value: gemini-1.5-pro
      - key: CHUNK_SIZE
        value: 800
      - key: CHUNK_OVERLAP
        value: 100
      - key: TOP_K_RESULTS
        value: 5
